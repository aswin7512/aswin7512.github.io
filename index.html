<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aswin P | Backend Engineer</title>
    
    <link rel="icon" type="image/x-icon" href="public/favicon.ico">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="terminal">
        <div class="neofetch-wrapper">
            <div class="profile-pic-container" id="profile-container">
                <img src="public/profile.jpg" alt="Aswin P" class="profile-pic">
                <div class="profile-name">[ ASWIN P ]</div>
            </div>

            <div class="terminal-content" id="scroll-container">
                <div class="line">
                    <span class="prompt-span"><span class="p-user">aswinrd@fedora</span> <span class="p-path">~</span><span class="p-sym">></span></span>neofetch --user aswinrd
                </div>
                <div class="output" id="typewriter"></div>
                
                <div id="history"></div>
                
                <div class="input-line" id="cmd-line" style="display: none;">
                    <span class="prompt-span"><span class="p-user">aswinrd@fedora</span> <span class="p-path">~</span><span class="p-sym">></span></span>
                    <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autofocus>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
